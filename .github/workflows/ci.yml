name: ci

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - README.md
  pull_request:
    branches: [main]
    paths-ignore:
      - README.md

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v5

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install
        run: uv sync --dev

      - name: check linting
        run: uv run ruff check

      - name: check types
        run: uv run ty check

      - name: run tests with coverage
        run: uv run pytest --cov --cov-branch --cov-report=xml

      - name: upload coverage reports to codecov
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && github.ref == 'refs/heads/main' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  examples:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v5

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: install
        run: uv sync --dev

      - name: install just
        uses: extractions/setup-just@v3

      - name: install resonate server
        run: |
          curl -sSL https://github.com/resonatehq/resonate/releases/latest/download/resonate_linux_x86_64.tar.gz | tar -xz
          sudo mv resonate /usr/local/bin/resonate

      - name: start resonate server
        run: |
          resonate serve --server-port 8080 &
          until curl -s -o /dev/null http://localhost:8080/api/v1/promises; do sleep 0.5; done

      - name: run examples
        run: just examples
        env:
          RESONATE_URL: http://localhost:8080
