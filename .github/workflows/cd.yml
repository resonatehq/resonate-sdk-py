name: cd

on:
  release:
    types: [released]

jobs:
  # Everything that can reject a bad release happens here, before any
  # upload: the root package must carry the tag's version, the test
  # suite must pass from source, and -- the check that matters for
  # independent versioning -- it must pass again with the built wheels
  # installed by the real resolver instead of the [tool.uv.sources]
  # workspace links dev uses, which proves each member's declared
  # dependency range is satisfiable by the artifact set being shipped.
  # The publish job ships exactly the artifacts this job built.
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.21

      - name: set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The tag tracks the root SDK's version; a mismatch means the wheel
      # would publish under the wrong version (or skip-existing would drop
      # it), so nothing ships.
      - name: verify the root version matches the release tag
        run: |
          version=$(uv version --short)
          test "$version" = "${GITHUB_REF_NAME#v}" \
            || { echo "root version $version != tag ${GITHUB_REF_NAME#v}"; exit 1; }

      - name: install
        run: uv sync --locked --all-extras --all-packages

      - name: run tests
        run: uv run pytest

      - name: build library
        run: uv build --all-packages

      # Reinstall the workspace packages from the built wheels with the
      # real resolver (no --no-deps), then run the whole suite against
      # exactly the code that will be published. Explicit wheel paths pin
      # every workspace package to its built artifact, so the resolver
      # cannot substitute a PyPI release, and it must satisfy each
      # member's declared range against the shipped set -- a range that
      # does not admit the built root fails the install here. No package
      # is named, so a new member is covered the day it appears in dist.
      - name: run tests against the built artifacts
        run: |
          uv pip install --reinstall dist/*.whl
          uv run --no-sync pytest

      - name: upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    needs: verify

    permissions:
      id-token: write

    runs-on: ubuntu-latest

    steps:
      - name: download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # PyPI uploads are not atomic across files, so publish in
      # dependency order: the root package first, then the members that
      # depend on it. A mid-publish failure can then only leave
      # resonate-sdk released with the members not yet out -- a state
      # that breaks no installs -- and skip-existing lets a re-run
      # finish the release. skip-existing also carries the independent
      # versioning model: a member whose version is already on PyPI is
      # skipped, which is how an unchanged member rides along a root
      # release without being republished -- and the verify job rejects
      # a changed member whose version is already out, so a skip here is
      # always a deliberate ride-along.
      - name: split out the root package artifacts
        run: |
          mkdir dist-root
          mv dist/resonate_sdk-* dist-root/

      - name: push resonate-sdk to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          packages-dir: dist-root/
          skip-existing: true

      - name: push workspace members to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          packages-dir: dist/
          skip-existing: true
